<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="شعار ألبان وأجبان القصر">
  <title>ألبان وأجبان القصر</title>
  <defs>
    <linearGradient id="m-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2d8659"/>
      <stop offset="100%" stop-color="#1a3d2b"/>
    </linearGradient>
    <linearGradient id="m-drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6f0"/>
    </linearGradient>
  </defs>

  <!-- Gold three-arch crown -->
  <g fill="#d4a55a">
    <path d="M 72,38 Q 78,18 86,38 L 92,38 Q 100,8 108,38 L 114,38 Q 122,18 128,38 Z"/>
    <circle cx="82"  cy="20" r="2.2"/>
    <circle cx="100" cy="10" r="2.8"/>
    <circle cx="118" cy="20" r="2.2"/>
    <rect x="70" y="38" width="60" height="4" rx="1.5"/>
  </g>

  <!-- Forest-green palace arch -->
  <path d="M 38,178 L 38,96 Q 38,46 100,46 Q 162,46 162,96 L 162,178 Z" fill="url(#m-shield)"/>

  <!-- subtle inner highlight -->
  <path d="M 46,170 L 46,98 Q 46,54 100,54 Q 154,54 154,98 L 154,170"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- White milk drop inside the arch -->
  <path d="M 100,76 Q 78,104 78,134 Q 78,158 100,158 Q 122,158 122,134 Q 122,104 100,76 Z"
        fill="url(#m-drop)"/>

  <!-- soft highlight on drop -->
  <path d="M 92,98 Q 86,116 90,132" fill="none" stroke="#2d8659" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"/>

  <!-- gold base band -->
  <rect x="38" y="172" width="124" height="6" fill="#d4a55a" opacity="0.9"/>
</svg>
