<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-label="شعار ألبان وأجبان القصر">
  <title>ألبان وأجبان القصر — Alban wa Ajban Al-Qasr</title>
  <defs>
    <linearGradient id="h-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2d8659"/>
      <stop offset="100%" stop-color="#1a3d2b"/>
    </linearGradient>
    <linearGradient id="h-drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6f0"/>
    </linearGradient>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap');
      .ar-display { font-family: 'Amiri', 'Traditional Arabic', 'Times New Roman', serif; fill: #1a3d2b; }
      .ar-body    { font-family: 'Cairo',  'Tahoma', sans-serif; fill: #6b7d72; }
      .en-body    { font-family: 'Cairo',  'Segoe UI', sans-serif; fill: #6b7d72; letter-spacing: 1.5px; }
    ]]></style>
  </defs>

  <!-- MARK (right side; RTL natural). Mark extents: x≈708→832, y≈25→205 -->
  <g transform="translate(670 25)">
    <g fill="#d4a55a">
      <path d="M 72,38 Q 78,18 86,38 L 92,38 Q 100,8 108,38 L 114,38 Q 122,18 128,38 Z"/>
      <circle cx="82"  cy="20" r="2.2"/>
      <circle cx="100" cy="10" r="2.8"/>
      <circle cx="118" cy="20" r="2.2"/>
      <rect x="70" y="38" width="60" height="4" rx="1.5"/>
    </g>
    <path d="M 38,178 L 38,96 Q 38,46 100,46 Q 162,46 162,96 L 162,178 Z" fill="url(#h-shield)"/>
    <path d="M 46,170 L 46,98 Q 46,54 100,54 Q 154,54 154,98 L 154,170" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
    <path d="M 100,76 Q 78,104 78,134 Q 78,158 100,158 Q 122,158 122,134 Q 122,104 100,76 Z" fill="url(#h-drop)"/>
    <path d="M 92,98 Q 86,116 90,132" fill="none" stroke="#2d8659" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"/>
    <rect x="38" y="172" width="124" height="6" fill="#d4a55a" opacity="0.9"/>
  </g>

  <!-- WORDMARK. text-anchor=end alone anchors RIGHT edge of Arabic at x=630;
       Unicode bidi handles RTL flow without needing direction="rtl" (which would invert anchor) -->
  <text x="630" y="118" text-anchor="end" class="ar-display" font-size="48" font-weight="700">
    ألبان وأجبان القصر
  </text>

  <!-- thin gold divider (below wordmark descenders) -->
  <line x1="220" y1="150" x2="630" y2="150" stroke="#d4a55a" stroke-width="1.2" opacity="0.75"/>

  <text x="630" y="180" text-anchor="end" class="ar-body" font-size="18" font-weight="500">
    مصنع منتجات الألبان — عرابة، جنين
  </text>

  <text x="630" y="210" text-anchor="end" class="en-body" font-size="12" font-weight="600">
    PALACE DAIRY · ARRABA, JENIN
  </text>
</svg>
