<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-label="شعار ألبان وأجبان القصر — نسخة أحادية اللون داكنة">
  <title>ألبان وأجبان القصر — single-color dark (for light backgrounds)</title>
  <defs>
    <!-- Mask: white = visible, black = hidden. Drop area is black → knocked out -->
    <mask id="md-knockout">
      <rect width="900" height="240" fill="white"/>
      <path transform="translate(670 25)"
            d="M 100,76 Q 78,104 78,134 Q 78,158 100,158 Q 122,158 122,134 Q 122,104 100,76 Z"
            fill="black"/>
    </mask>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap');
      .ar-display { font-family: 'Amiri', 'Traditional Arabic', 'Times New Roman', serif; fill: #1a3d2b; }
      .ar-body    { font-family: 'Cairo',  'Tahoma', sans-serif; fill: #1a3d2b; }
      .en-body    { font-family: 'Cairo',  'Segoe UI', sans-serif; fill: #1a3d2b; letter-spacing: 1.5px; }
    ]]></style>
  </defs>

  <!-- MARK in mono forest. Mark extents: x≈708→832, y≈25→205 -->
  <g transform="translate(670 25)" fill="#1a3d2b" mask="url(#md-knockout)">
    <!-- crown -->
    <path d="M 72,38 Q 78,18 86,38 L 92,38 Q 100,8 108,38 L 114,38 Q 122,18 128,38 Z"/>
    <circle cx="82"  cy="20" r="2.2"/>
    <circle cx="100" cy="10" r="2.8"/>
    <circle cx="118" cy="20" r="2.2"/>
    <rect x="70" y="38" width="60" height="4" rx="1.5"/>
    <!-- shield (drop knocked out via mask) -->
    <path d="M 38,178 L 38,96 Q 38,46 100,46 Q 162,46 162,96 L 162,178 Z"/>
  </g>

  <!-- gold base band stays outside mask, drawn over shield bottom -->
  <rect transform="translate(670 25)" x="38" y="172" width="124" height="6" fill="#1a3d2b" opacity="0.7"/>

  <text x="630" y="118" text-anchor="end" class="ar-display" font-size="48" font-weight="700">
    ألبان وأجبان القصر
  </text>

  <line x1="220" y1="150" x2="630" y2="150" stroke="#1a3d2b" stroke-width="1.2" opacity="0.55"/>

  <text x="630" y="180" text-anchor="end" class="ar-body" font-size="18" font-weight="500" opacity="0.85">
    مصنع منتجات الألبان — عرابة، جنين
  </text>

  <text x="630" y="210" text-anchor="end" class="en-body" font-size="12" font-weight="600" opacity="0.85">
    PALACE DAIRY · ARRABA, JENIN
  </text>
</svg>
