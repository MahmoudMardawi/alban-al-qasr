[build]
  command = "npm run build"
  publish = ".next"

# NEXT_PUBLIC_* values are exposed to the browser by Next.js design.
# They are NOT secrets; tell Netlify's scanner to ignore them.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_BRAND_NAME,NEXT_PUBLIC_BRAND_AREA"

[[plugins]]
  package = "@netlify/plugin-nextjs"
